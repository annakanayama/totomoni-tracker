<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ととモニ 発言トラッカー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #7c6ef7;
    --accent2: #4ecdc4;
    --gold: #f7c948;
    --silver: #b0b8d1;
    --bronze: #e0956a;
    --text: #e8eaf6;
    --text2: #8890b5;
    --green: #4ecdc4;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 24px; }
  .logo-title { font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
  .logo-sub { font-size: 11px; color: var(--text2); }

  /* Nav */
  .nav { display: flex; gap: 4px; }
  .nav-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text2);
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .nav-btn:hover { color: var(--text); border-color: var(--border); }
  .nav-btn.active {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }

  /* Main */
  .main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

  /* Page */
  .page { display: none; }
  .page.active { display: block; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.4rem;
    flex: 1;
    min-width: 120px;
  }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; letter-spacing: 0.05em; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.gold { color: var(--gold); }
  .stat-value.green { color: var(--green); }

  /* Period tabs */
  .period-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    width: fit-content;
  }
  .period-btn {
    background: none;
    border: none;
    color: var(--text2);
    padding: 6px 20px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .period-btn.active {
    background: var(--accent);
    color: white;
    font-weight: 500;
  }
  .period-date {
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 1rem;
    margin-top: -0.5rem;
  }

  /* Ranking list */
  .ranking-list { display: flex; flex-direction: column; gap: 6px; }
  .rank-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s;
    cursor: pointer;
  }
  .rank-item:hover { border-color: var(--accent); }
  .rank-item.rank-1 { border-color: var(--gold); background: linear-gradient(90deg, rgba(247,201,72,0.08) 0%, var(--surface) 100%); }
  .rank-item.rank-2 { border-color: var(--silver); background: linear-gradient(90deg, rgba(176,184,209,0.06) 0%, var(--surface) 100%); }
  .rank-item.rank-3 { border-color: var(--bronze); background: linear-gradient(90deg, rgba(224,149,106,0.06) 0%, var(--surface) 100%); }

  .rank-num {
    font-size: 13px;
    font-weight: 700;
    width: 28px;
    text-align: center;
    color: var(--text2);
    flex-shrink: 0;
  }
  .rank-1 .rank-num { color: var(--gold); font-size: 16px; }
  .rank-2 .rank-num { color: var(--silver); font-size: 15px; }
  .rank-3 .rank-num { color: var(--bronze); font-size: 15px; }

  .rank-name {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .rank-bar-wrap { flex: 2; min-width: 80px; }
  .rank-bar-bg {
    background: var(--surface2);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  .rank-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.6s ease;
  }
  .rank-1 .rank-bar-fill { background: linear-gradient(90deg, var(--gold), #ffeb9c); }
  .rank-2 .rank-bar-fill { background: linear-gradient(90deg, var(--silver), #d8ddf0); }
  .rank-3 .rank-bar-fill { background: linear-gradient(90deg, var(--bronze), #f0c4a0); }

  .rank-count {
    font-size: 15px;
    font-weight: 700;
    width: 50px;
    text-align: right;
    flex-shrink: 0;
  }
  .rank-unit { font-size: 11px; color: var(--text2); margin-left: 2px; }

  /* Calendar page */
  .calendar-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .cal-nav {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: border-color 0.2s;
  }
  .cal-nav:hover { border-color: var(--accent); }
  .cal-month { font-size: 18px; font-weight: 700; }

  .calendar-grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-x: auto;
  }

  .cal-row {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .cal-member-name {
    width: 100px;
    font-size: 11px;
    color: var(--text2);
    text-align: right;
    padding-right: 8px;
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cal-header-row .cal-member-name { color: var(--text2); font-size: 10px; }
  .cal-day-label {
    width: 22px;
    font-size: 10px;
    color: var(--text2);
    text-align: center;
    flex-shrink: 0;
  }
  .cal-cell {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    flex-shrink: 0;
    position: relative;
    cursor: default;
  }
  .cal-cell[title]:hover::after {
    content: attr(title);
    position: absolute;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 3px 7px;
    border-radius: 5px;
    font-size: 11px;
    white-space: nowrap;
    z-index: 10;
  }

  .heat-0 { background: var(--surface2); }
  .heat-1 { background: #2d3a6e; }
  .heat-2 { background: #3d52a8; }
  .heat-3 { background: #5c6fe0; }
  .heat-4 { background: var(--accent); }
  .heat-5 { background: #a89eff; }

  /* Legend */
  .cal-legend {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 1rem;
    font-size: 11px;
    color: var(--text2);
  }
  .legend-cell {
    width: 16px; height: 16px; border-radius: 3px;
  }
</style>
</head>

<div class="header">
  <div class="logo">
    <span class="logo-icon">💬</span>
    <div>

</div>

    <div style="margin-top:1rem; overflow-x:auto;">

  </div>

</div>

let currentPeriod = 'total';
let currentMonth = '2026-06';
let calYear = 2026, calMonth = 6;

function getScore(member, period) {
  const d = DATA[member];
  if (period === 'total') return d.total;
  const now = new Date('2026-06-29');
  if (period === 'week') {
    const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 6);
    return Object.entries(d.daily).filter(([dt]) => new Date(dt) >= cutoff).reduce((s,[,v])=>s+v,0);
  }
  if (period === 'month') {
    return Object.entries(d.daily).filter(([dt]) => dt.startsWith('2026-06')).reduce((s,[,v])=>s+v,0);
  }
  return 0;
}

function renderRanking() {
  const list = document.getElementById('ranking-list');
  const members = Object.keys(DATA).map(m => ({ name: m, score: getScore(m, currentPeriod) }))
    .filter(m => m.score > 0)
    .sort((a, b) => b.score - a.score);
  const max = members[0]?.score || 1;
  list.innerHTML = members.map((m, i) => {
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    const rankLabel = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}`;
    const pct = Math.round(m.score / max * 100);
    return `<div class="rank-item ${rankClass}">
      <div class="rank-num">${rankLabel}</div>
      <div class="rank-name">${m.name}</div>
      <div class="rank-bar-wrap">
        <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="rank-count">${m.score}<span class="rank-unit">件</span></div>
    </div>`;
  }).join('');
}

function setPeriod(period, btn) {
  currentPeriod = period;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const label = document.getElementById('period-date-label');
  if (period === 'total') label.textContent = '📅 2026/5/8 〜 2026/6/29';
  if (period === 'month') label.textContent = '📅 2026/6/1 〜 2026/6/29';
  if (period === 'week') label.textContent = '📅 2026/6/23 〜 2026/6/29';
  renderRanking();
}

function renderCalendar() {
  const label = document.getElementById('cal-month-label');
  label.textContent = `${calYear}年${calMonth}月`;
  const daysInMonth = new Date(calYear, calMonth, 0).getDate();
  const monthStr = `${calYear}-${String(calMonth).padStart(2,'0')}`;

  // 発言あるメンバーだけ表示
  const members = Object.keys(DATA).filter(m =>
    Object.keys(DATA[m].daily).some(d => d.startsWith(monthStr))
  ).sort((a,b) => DATA[b].total - DATA[a].total);

  const grid = document.getElementById('calendar-grid');

  const weekDays = ['日','月','火','水','木','金','土'];

  // ヘッダー行（日付）
  let html = `<div class="cal-row cal-header-row">
    <div class="cal-member-name"></div>
    ${Array.from({length:daysInMonth},(_,i)=>`<div class="cal-day-label">${i+1}</div>`).join('')}
  </div>`;
  // 曜日行
  html += `<div class="cal-row cal-header-row">
    <div class="cal-member-name"></div>
    ${Array.from({length:daysInMonth},(_,i)=>{
      const dow = new Date(calYear, calMonth-1, i+1).getDay();
      const color = dow===0 ? '#f77' : dow===6 ? '#7af' : '';
      return `<div class="cal-day-label" style="color:${color};font-weight:500;">${weekDays[dow]}</div>`;
    }).join('')}
  </div>`;

  members.forEach(m => {
    const daily = DATA[m].daily;
    const vals = Array.from({length:daysInMonth},(_,i)=>{
      const key = `${monthStr}-${String(i+1).padStart(2,'0')}`;
      return daily[key] || 0;
    });
    const max = Math.max(...vals, 1);
    const cells = vals.map((v,i) => {
      let heat = 0;
      if (v > 0) heat = Math.min(5, Math.ceil(v / max * 5));
      const title = v > 0 ? `${i+1}日: ${v}件` : '';
      return `<div class="cal-cell heat-${heat}" title="${title}"></div>`;
    }).join('');
    html += `<div class="cal-row">
      <div class="cal-member-name" title="${m}">${m}</div>
      ${cells}
    </div>`;
  });

  grid.innerHTML = html;
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 12) { calMonth = 1; calYear++; }
  if (calMonth < 1) { calMonth = 12; calYear--; }
  renderCalendar();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// 初期化
renderRanking();
renderCalendar();
